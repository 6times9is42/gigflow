version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: gigflow-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - gigflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gigflow-server
    restart: unless-stopped
    env_file: .env
    environment:
      # Override MONGODB_URI so the server connects to the mongo container
      - MONGODB_URI=mongodb://mongo:27017/smart-leads
    ports:
      - "5000:5000"
    networks:
      - gigflow-net
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: gigflow-client
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - gigflow-net
    depends_on:
      server:
        condition: service_healthy

networks:
  gigflow-net:
    driver: bridge

volumes:
  mongo_data:
